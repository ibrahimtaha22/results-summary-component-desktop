<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=League+Spartan:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Results summary component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <main>
      <div class="left-section">
          <h1>Your Result</h1>
          <p class="radial-box-num"><span class="score-num">76</span> of 100</p>
          <h2>Great</h2>
          <p class="score-description">
            You scored higher than 65% of the people who have taken these tests.
          </p>
      </div>
      <div class="right-section">
        <header>
          <div>   </div>
          <h3>Summary</h3>
          <div>   </div>
        </header>
        <article class="summary-items">
          <div class="summary-items-flex">
          <div class="item-flex">
          <img src="assets/images/icon-reaction.svg" alt=""/>
          <p>Reaction</p>
          </div>
          <p class="percent-numerator">80 <span class="percent-denominator">/ 100 <span></p>
          </div>
          <div class="summary-items-flex">
            <div class="item-flex">
              <img src="assets/images/icon-memory.svg" alt=""/>
              <p>Memory </p>
            </div>
<p class="percent-numerator" >92 <span class="percent-denominator">/ 100<span></p>
          </div>
          <div class="summary-items-flex">
            <div class="item-flex">
              <img src="assets/images/icon-verbal.svg" alt=""/>
              <p>Verbal </p>
            </div>
            <p class="percent-numerator">61 <span class="percent-denominator">/ 100<span></p>
          </div>
          <div class="summary-items-flex">
            <div class="item-flex">
              <img src="assets/images/icon-visual.svg" alt=""/>
              <p>Visual </p>
            </div>
            <p class="percent-numerator">72 <span class="percent-denominator">/ 100<span></p>
          </div>
          <button>Continue</button>
        </article>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/ibrahimtaha22">Hema</a>.
    </footer>
  </body>
</html>
